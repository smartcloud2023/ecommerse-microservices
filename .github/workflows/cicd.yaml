name: Build All Service Image

on:
  push:
    branches:
      - main
     
    

jobs:
  build-and-push-images-to-ECR:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

# AWS Credentials 
#================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

# Login to ECR
#=============
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      # Create repo if not exists
      #==========================
      - name: Create ECR repository if needed
        run: |
            repos=(
            accounting ad cart checkout currency email flagd flagd-ui fraud-detection
            frontend frontend-proxy grafana image-provider jaeger kafka llm
            load-generator opensearch otel-collector payment postgresql
            product-catalog product-reviews prometheus quote react-native-app
            recommendation shipping
            )

            for repo in "${repos[@]}"; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$repo"
            done


      - name: Build and push Docker images
        run: |
            echo "${{ vars.ENV_FILE }}" > .env 
            export $(grep -v '^#' .env | xargs) 

            #accounting


            services=(
            ad cart checkout currency email flagd flagd-ui fraud-detection
            frontend frontend-proxy grafana image-provider jaeger kafka llm
            load-generator opensearch otel-collector payment postgresql
            product-catalog product-reviews prometheus quote react-native-app
            recommendation shipping
            )
            # Use GitHub Actions run number as build ID
            export BUILD_ID=${GITHUB_RUN_NUMBER}
            for service in "${services[@]}"; do
            echo "Building and pushing $service..."
            cp .env "./src/$service/.env"
            cat "./src/$service/.env"
            docker build -t "$service:$BUILD_ID" -f "./src/$service/Dockerfile" .
            docker tag "$service:$BUILD_ID" "${{ steps.login-ecr.outputs.registry }}/$service:$BUILD_ID"
            docker push "${{ steps.login-ecr.outputs.registry }}/$service:$BUILD_ID"
            done